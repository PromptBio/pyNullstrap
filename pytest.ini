[tool:pytest]
# pytest configuration for pyNullstrap

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    model: marks tests for model classes
    utils: marks tests for utility functions
    cox: marks tests that require scikit-survival (skip on Windows)

# Minimum version
minversion = 7.0

# Test timeout (in seconds) - disabled since pytest-timeout not available
# timeout = 600

# Coverage options (when using pytest-cov)
# addopts = --cov=nullstrap --cov-report=html --cov-report=term-missing

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sklearn.*
